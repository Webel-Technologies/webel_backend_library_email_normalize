# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://help.github.com/actions/language-and-framework-guides/publishing-nodejs-packages

name: normalize-email-cd

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v4
              with:
                  version: 11.1.0
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm test
            - name: Verify Node 12 package compatibility
              run: |
                  mkdir "$RUNNER_TEMP/pack" "$RUNNER_TEMP/extracted"
                  pnpm pack --pack-destination "$RUNNER_TEMP/pack"
                  tar -xzf "$RUNNER_TEMP/pack"/*.tgz -C "$RUNNER_TEMP/extracted"
            - uses: actions/setup-node@v6
              with:
                  node-version: 12
            - run: node -e "require(process.env.RUNNER_TEMP + '/extracted/package')('test+alias@gmail.com')"

    publish-gpr:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v4
              with:
                  version: 11.1.0
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  registry-url: https://npm.pkg.github.com/
            - run: pnpm install --frozen-lockfile
            - run: pnpm publish
              env:
                  NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
